<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>HelloScoring - Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap');
:root{
  --bg:#0a0a0f;--bg2:#13131a;--bg3:#1a1a24;--bg4:#22222e;
  --bdr:#2a2a38;--bdr2:#333344;
  --gold:#c9a84c;--gold2:#e8c96d;--gold3:rgba(201,168,76,.15);
  --purple:#8b5cf6;--purpleL:#a78bfa;
  --txt:#e8e8f0;--txt2:#9999b0;--txt3:#555566;
  --green:#22c55e;--orange:#f97316;--red:#ef4444;
  --accent:#c9a84c;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
button{cursor:pointer;font-family:inherit;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}

/* HEADER */
#hdr{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:.7rem 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:1rem;}
.brand{font-family:'Syne',Georgia,serif;font-size:1.1rem;letter-spacing:-.01em;}
.brand .r{color:var(--gold);font-weight:800;}
.brand .w{color:var(--txt);font-weight:700;}
.subhdr{font-size:.62rem;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* MODE BUTTONS — bien visibles avec description */
.mbtns{display:flex;gap:.5rem;flex-shrink:0;}
.mbtn{display:flex;flex-direction:column;align-items:center;padding:.4rem .9rem;border-radius:8px;border:1.5px solid var(--bdr2);color:var(--txt2);font-size:.72rem;font-weight:500;background:transparent;gap:2px;transition:all .2s;line-height:1;}
.mbtn .mico{font-size:1rem;}
.mbtn .msub{font-size:.52rem;opacity:.6;font-weight:400;}
.mbtn:hover{border-color:var(--gold);color:var(--gold);}
.mbtn.on{background:var(--gold3);border-color:var(--gold);color:var(--gold);font-weight:600;}
.mbtn.on .mico{color:var(--gold);}

/* LAYOUT */
#lay{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
#side{width:196px;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .2s;}
#side.shut{width:0;}
.stop{padding:.8rem .9rem;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.sbot{flex:1;padding:.8rem .9rem;overflow-y:auto;}
.slbl{font-size:.55rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--txt2);margin-bottom:6px;margin-top:10px;opacity:.6;}
.slbl:first-child{margin-top:0;}

/* Chapitre buttons */
.cbtn{width:100%;text-align:left;padding:.42rem .6rem;border-radius:8px;border:none;font-size:.76rem;display:flex;align-items:center;gap:7px;margin-bottom:2px;background:transparent;color:var(--txt2);position:relative;transition:all .15s;}
.cbtn:hover{background:var(--bg3);color:var(--txt);}
.cbtn.on{background:var(--gold3);color:var(--gold);font-weight:600;}
.cbtn .cico{font-size:.8rem;width:16px;text-align:center;opacity:.7;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--gold);display:none;margin-left:auto;flex-shrink:0;}
.dot.vis{display:block;}

/* Filter / compare buttons */
.fbtn{display:block;width:100%;text-align:left;padding:3px 6px;border-radius:5px;border:none;font-size:.7rem;margin-bottom:2px;background:transparent;color:var(--txt2);transition:all .1s;}
.fbtn:hover{background:var(--bg3);color:var(--txt);}
.fbtn.on{background:var(--gold3);color:var(--gold);font-weight:600;}
.dbtn{display:block;width:100%;text-align:left;padding:3px 6px;border-radius:5px;border:none;font-size:.7rem;margin-bottom:2px;background:transparent;color:var(--txt2);transition:all .1s;}
.dbtn:hover{background:var(--bg3);}
.dbtn.on{background:var(--bg4);color:var(--txt);font-weight:500;}
.vbtn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:4px 6px;border-radius:5px;border:none;font-size:.7rem;margin-bottom:2px;background:transparent;color:var(--txt2);transition:all .1s;}
.vbtn:hover:not(.disabled){background:var(--bg3);}
.nbadge{padding:.4rem .6rem;background:var(--bg3);border-radius:6px;font-size:.68rem;color:var(--txt2);text-align:center;margin-top:6px;border:1px solid var(--bdr);}
.rv{font-weight:700;color:var(--gold);}
.tatog{font-size:.58rem;color:var(--purpleL);background:none;border:1px solid var(--purple);border-radius:3px;padding:1px 6px;white-space:nowrap;transition:all .15s;}
.tatog:hover{background:var(--purple);color:white;}
.selleg{margin-top:8px;padding:.4rem .5rem;background:var(--bg);border-radius:6px;border:1px solid var(--bdr);}
.sli{display:flex;align-items:center;gap:5px;font-size:.62rem;color:var(--txt2);margin-bottom:2px;}
.sld{width:7px;height:7px;border-radius:50%;}

/* MAIN */
#main{flex:1;overflow-y:auto;padding:1rem 1.3rem;background:var(--bg);}

/* Chapter header */
.chdr{display:flex;align-items:center;gap:.7rem;margin-bottom:.9rem;flex-wrap:wrap;padding-bottom:.7rem;border-bottom:1px solid var(--bdr);}
.chtitle{font-family:'Syne',serif;font-size:1.25rem;font-weight:700;color:var(--txt);}
.cbadge{color:white;padding:2px 9px;border-radius:99px;font-size:.62rem;font-weight:600;}
.ctrls{margin-left:auto;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;}

/* INVERSION TOGGLE — visible et explicite */
.vtog{display:flex;background:var(--bg3);border-radius:10px;padding:3px;border:1px solid var(--bdr2);}
.vtbtn{padding:.3rem .75rem;border-radius:7px;border:none;font-size:.68rem;background:transparent;color:var(--txt2);transition:all .18s;white-space:nowrap;}
.vtbtn:hover{color:var(--txt);}
.vtbtn.on{background:var(--bg4);color:var(--gold);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.4);}

/* Export button */
.expbtn{display:flex;align-items:center;gap:5px;padding:.32rem .7rem;border-radius:8px;border:1.5px solid var(--bdr2);background:transparent;color:var(--txt2);font-size:.68rem;font-weight:500;transition:all .15s;}
.expbtn:hover{border-color:var(--gold);color:var(--gold);}

/* Filter recap */
.frecap{display:flex;align-items:center;gap:6px;padding:.5rem .8rem;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:8px;margin-bottom:.9rem;flex-wrap:wrap;font-size:.7rem;}
.ftag{background:var(--gold3);color:var(--gold);padding:2px 8px;border-radius:99px;font-size:.62rem;font-weight:600;border:1px solid rgba(201,168,76,.3);}
.fclr{font-size:.62rem;color:var(--gold);background:none;border:none;text-decoration:underline;margin-left:auto;cursor:pointer;opacity:.7;}
.fclr:hover{opacity:1;}

/* Comment box — style Écho */
.cbox{background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--bdr2);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;padding:.8rem 1rem;margin-bottom:.9rem;font-size:.8rem;line-height:1.7;display:flex;gap:.6rem;color:var(--txt);}
.cbox .echo-name{font-size:.6rem;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:4px;}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:1.1rem;}
.ctitle{font-size:.58rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--txt2);margin-bottom:10px;opacity:.6;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;margin-bottom:.9rem;}

/* KPIs */
.kpi{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:.9rem 1rem;transition:border-color .2s;}
.kpi:hover{border-color:var(--bdr2);}
.kv{font-family:'Syne',serif;font-size:2rem;font-weight:700;line-height:1;}
.kl{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--txt2);margin-top:4px;opacity:.7;}

/* Distribution */
.dw{display:flex;align-items:flex-end;gap:3px;height:80px;}
.dc{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.db{width:100%;border-radius:3px 3px 0 0;transition:opacity .2s;}
.dc:hover .db{opacity:1!important;filter:brightness(1.3);}
.dn{font-size:.5rem;color:var(--txt2);font-weight:600;min-height:8px;}
.dl{font-size:.48rem;color:var(--txt2);opacity:.5;}

/* Bars */
.br{display:flex;align-items:center;gap:7px;margin-bottom:.45rem;cursor:default;}
.bl{font-size:.74rem;color:var(--txt2);min-width:148px;flex-shrink:0;}
.bl.w{color:var(--orange);}
.bt{flex:1;height:9px;background:var(--bg3);border-radius:99px;overflow:hidden;position:relative;}
.bf{height:100%;border-radius:99px;transition:width .4s;}
.bv{font-size:.7rem;font-weight:600;min-width:32px;text-align:right;color:var(--txt);}
.bn{font-size:.6rem;color:var(--txt2);min-width:22px;opacity:.6;}

/* Group bars */
.gw{margin-bottom:.65rem;}
.gl{font-size:.76rem;color:var(--txt);margin-bottom:3px;font-weight:500;}
.gr{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.gd{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.gn{width:96px;font-size:.62rem;color:var(--txt2);flex-shrink:0;}
.gt{flex:1;height:8px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.gf{height:100%;border-radius:99px;transition:width .4s;}
.gp{font-size:.65rem;font-weight:600;min-width:30px;text-align:right;color:var(--txt);}

/* Verbatim cards */
.vg{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.vc{background:var(--bg2);border-left-width:3px;border-left-style:solid;border-radius:0 10px 10px 0;padding:.8rem .9rem;border-top:1px solid var(--bdr);border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr);}
.vt{font-size:.82rem;font-style:italic;line-height:1.65;margin-bottom:.45rem;color:var(--txt);}
.vtgs{display:flex;gap:3px;flex-wrap:wrap;}
.tag{padding:2px 8px;border-radius:99px;font-size:.6rem;}
.tsc{font-weight:600;}
.ti{background:rgba(139,92,246,.12);color:var(--purpleL);}

/* Sort buttons */
.vsrt{display:flex;align-items:center;gap:6px;margin-bottom:.8rem;flex-wrap:wrap;}
.srtb{padding:3px 10px;border-radius:99px;font-size:.68rem;border:1.5px solid var(--bdr2);background:transparent;color:var(--txt2);transition:all .12s;}
.srtb:hover{border-color:var(--gold);color:var(--gold);}
.srtb.on{border-color:var(--gold);background:var(--gold3);color:var(--gold);font-weight:600;}

/* Too small warning */
.ts{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.3);border-radius:8px;padding:.45rem .9rem;margin-bottom:.4rem;font-size:.72rem;color:var(--orange);display:flex;gap:6px;align-items:center;}

/* Compare cards */
.cg{display:grid;gap:.8rem;}
.cc{background:var(--bg2);border-radius:12px;padding:1rem;border-width:2px;border-style:solid;}
.ch2{display:flex;align-items:center;gap:7px;margin-bottom:.8rem;}
.cd{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.ccl{font-weight:600;font-size:.84rem;color:var(--txt);}
.cn2{font-size:.62rem;color:var(--txt2);margin-left:auto;}
.ckr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bdr);}
.ckl{font-size:.67rem;color:var(--txt2);}
.ckv{font-weight:700;font-size:.88rem;}
.empty{text-align:center;padding:3rem;color:var(--txt2);font-size:.84rem;}

/* MODAL */
#mod{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:8888;align-items:center;justify-content:center;padding:1rem;}
#mod.open{display:flex;}
#mbox{background:var(--bg2);border:1px solid var(--bdr2);border-radius:16px;overflow:hidden;max-width:520px;width:100%;max-height:90vh;display:flex;flex-direction:column;}
#mhdr{background:var(--bg);padding:.8rem 1.1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);}
#mimg{overflow-y:auto;flex:1;}
#mimg img{width:100%;display:block;}
#mfoot{padding:.9rem 1.1rem;background:var(--bg2);flex-shrink:0;display:flex;flex-direction:column;gap:.6rem;}
#mdl{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.65rem 1rem;background:var(--gold);color:#0a0a0f;border-radius:9px;font-size:.82rem;font-weight:700;text-decoration:none;}
.mtip{display:flex;align-items:flex-start;gap:.5rem;padding:.5rem .7rem;background:var(--bg3);border-radius:8px;border:1px solid var(--bdr);font-size:.72rem;color:var(--txt2);line-height:1.5;}

/* Landscape */
@keyframes roth{from{transform:rotate(0deg)}to{transform:rotate(-90deg)}}
#lsp{display:none;position:fixed;inset:0;background:var(--bg);color:var(--txt);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;padding:2rem;text-align:center;}
@media(max-width:640px) and (orientation:portrait){#lsp{display:flex!important;}}
@media(max-width:768px){.g2,.vg{grid-template-columns:1fr;}.g4{grid-template-columns:repeat(2,1fr);}.bl{min-width:100px;}}
</style>
</head>

var EMOS=["Nostalgie","Energie","Melancolie","Frisson","Legerete","Intimite","Groove","Euphorie","Detachement"];
var ACTS=["Partagerait","Playlist","Fond","Concert","Aucune action"];
var ALBS=["Partagerait","Ajouterait en playlist","Mettrait en fond","Irait au concert","Aucune action"];
var DIMS={age:["18-24","25-34","35-44","45-54","55+"],genre:["Femme","Homme","Non-binaire"],rel:["Fan","Connais bien","Connais un peu","Decouverte"],hab:["Ecoute presque tout","Plusieurs morceaux","Quelques titres"]};
var DLBL={age:"Age",genre:"Genre",rel:"Relation",hab:"Habitudes"};
var CIDS=["notes","emotions","actions","segments","verbatims"];
var CLBLS={"notes":"Notes et Distribution","emotions":"Emotions","actions":"Intentions","segments":"Segments","verbatims":"Verbatims"};
var PAL=["#c9a84c","#8b5cf6","#22c55e","#f97316","#e879f9"];
var MIN_N=5;
var DIMS_KEYS=["age","genre","rel","hab"];

function avg(a){var s=0,i;for(i=0;i<a.length;i++)s+=a[i];return a.length?s/a.length:null;}
function pct(n,t){return t?Math.round(n/t*100):0;}
function scC(s){return s>=8?"#22c55e":s>=6?"#f97316":"#ef4444";}
function scB(s){return s>=8?"rgba(34,197,94,.15)":s>=6?"rgba(249,115,22,.15)":"rgba(239,68,68,.15)";}

function calcSt(rows){
  if(!rows.length)return null;
  var sc=[],pt=[],i,n6=0,nsh=0;
  for(i=0;i<rows.length;i++){sc.push(rows[i].sc);pt.push(rows[i].pt);if(rows[i].sc>=6)n6++;if(rows[i].act.indexOf("Partagerait")>-1)nsh++;}
  var dist=[],emos=[],acts=[],ei,ai,c,j;
  for(i=0;i<=10;i++){c=0;for(j=0;j<rows.length;j++)if(rows[j].sc===i)c++;dist.push({i:i,c:c});}
  for(ei=0;ei<EMOS.length;ei++){c=0;for(j=0;j<rows.length;j++)if(rows[j].emo.indexOf(EMOS[ei])>-1)c++;emos.push({e:EMOS[ei],p:pct(c,rows.length)});}
  for(ai=0;ai<ACTS.length;ai++){c=0;for(j=0;j<rows.length;j++)if(rows[j].act.indexOf(ACTS[ai])>-1)c++;acts.push({a:ACTS[ai],lb:ALBS[ai],p:pct(c,rows.length)});}
  return{n:rows.length,avgSc:(avg(sc)||0).toFixed(1),avgPt:(avg(pt)||0).toFixed(1),pct6:pct(n6,rows.length),pctSh:pct(nsh,rows.length),dist:dist,emos:emos,acts:acts};
}

var chap="notes",mode="explore",sideOpen=true;
var flt={age:"Tous",genre:"Tous",rel:"Tous",hab:"Tous"};
var cDim="rel",cSel=[],vSort="default",inverted=false;

function getExp(){
  var r=[],i,k,ok;
  for(i=0;i<RAW.length;i++){
    ok=true;
    for(k=0;k<DIMS_KEYS.length;k++){if(flt[DIMS_KEYS[k]]!=="Tous"&&RAW[i][DIMS_KEYS[k]]!==flt[DIMS_KEYS[k]]){ok=false;break;}}
    if(ok)r.push(RAW[i]);
  }
  return r;
}

function getGrps(){
  var g=[],rows,i,j;
  for(i=0;i<cSel.length;i++){
    rows=[];
    for(j=0;j<RAW.length;j++)if(RAW[j][cDim]===cSel[i])rows.push(RAW[j]);
    g.push({lbl:cSel[i],col:PAL[i%PAL.length],rows:rows});
  }
  return g;
}

function getComment(){
  if(mode!=="compare")return "";
  var grps=getGrps(),v=[],i;
  for(i=0;i<grps.length;i++)if(grps[i].rows.length>=MIN_N)v.push(grps[i]);
  if(v.length<2)return "";
  var s=[],best,worst,gap,topSh,lowSh;
  for(i=0;i<v.length;i++)s.push({lbl:v[i].lbl,st:calcSt(v[i].rows)});
  if(chap==="notes"){
    best=s[0];worst=s[0];
    for(i=1;i<s.length;i++){if(+s[i].st.avgSc>+best.st.avgSc)best=s[i];if(+s[i].st.avgSc<+worst.st.avgSc)worst=s[i];}
    gap=(+best.st.avgSc-+worst.st.avgSc).toFixed(1);
    if(+gap<0.5)return "Ce titre touche tout le monde de la meme facon - les notes sont quasi identiques quelle que soit la cible. C'est le signe d'une musique transversale, pas segmentee.";
    return "Ton titre accroche vraiment les "+best.lbl+" : ils te donnent "+best.st.avgSc+"/10 en moyenne. L'ecart de "+gap+" pts avec les "+worst.lbl+" ("+worst.st.avgSc+"/10) montre que tu as une cible naturelle - c'est elle qu'il faut activer en priorite.";
  }
  if(chap==="emotions"){
    var topE="",topD=0,mx,mn,ei,gi,fi,domLbl="",domP=0,lowLbl="",lowP=100;
    for(ei=0;ei<EMOS.length;ei++){
      mx=0;mn=100;
      for(gi=0;gi<s.length;gi++){for(fi=0;fi<s[gi].st.emos.length;fi++){if(s[gi].st.emos[fi].e===EMOS[ei]){if(s[gi].st.emos[fi].p>mx){mx=s[gi].st.emos[fi].p;domLbl=s[gi].lbl;domP=mx;}if(s[gi].st.emos[fi].p<mn){mn=s[gi].st.emos[fi].p;lowLbl=s[gi].lbl;lowP=mn;}}}}
      if(mx-mn>topD){topD=mx-mn;topE=EMOS[ei];domLbl=domLbl;lowLbl=lowLbl;}
    }
    return "L'emotion qui cree le plus de difference entre tes cibles, c'est la "+topE+". Elle est tres presente chez les "+domLbl+" mais beaucoup moins chez les "+lowLbl+". Autrement dit, ce titre ne provoque pas la meme chose selon qui l'ecoute.";
  }
  if(chap==="actions"){
    topSh=s[0];lowSh=s[0];
    for(i=1;i<s.length;i++){if(s[i].st.pctSh>topSh.st.pctSh)topSh=s[i];if(s[i].st.pctSh<lowSh.st.pctSh)lowSh=s[i];}
    if(topSh.lbl===lowSh.lbl)return "Les intentions sont similaires entre tes cibles - ton titre genere des comportements homogenes, quelle que soit la cible.";
    return topSh.st.pctSh+"% des "+topSh.lbl+" disent qu'ils partageraient ce titre. C'est ta meilleure cible de diffusion. Les "+lowSh.lbl+" sont plus passifs ("+lowSh.st.pctSh+"%) - ils apprécient mais ne propagent pas autant.";
  }
  if(chap==="verbatims")return "Lis les mots choisis par chaque groupe - pas seulement les notes. Souvent, les differences de vocabulaire revelent des attentes tres differentes que les chiffres ne capturent pas.";
  if(chap==="segments")return "Chaque barre represente la note moyenne d'une cible. Plus la barre est longue, plus cette cible apprécie ton titre. Les barres oranges signalent des groupes trop petits pour etre statistiquement fiables.";
  return "";
}

function mkBar(lbl,p,col,n,warn){
  var w=Math.min(100,p),bg=warn?"#f4a261":col,fc=warn?"#c87030":"#0e0f12";
  var nh=n!=null?"<span class='bn'>("+n+")</span>":"";
  return "<div class='br'><span class='bl"+(warn?" w":"")+"'>"+lbl+"</span>"+
    "<div class='bt'><div class='bf' style='width:"+w+"%;background:"+bg+"'></div></div>"+
    "<span class='bv' style='color:"+fc+"'>"+p+"%</span>"+nh+"</div>";
}

function mkGBar(lbl,grps){
  var h="<div class='gw'><div class='gl'>"+lbl+"</div>",i;
  for(i=0;i<grps.length;i++){
    h+="<div class='gr' title='"+grps[i].lbl+" : "+grps[i].p+"%'><div class='gd' style='background:"+grps[i].col+"'></div>"+
      "<div class='gn'>"+grps[i].lbl+"</div>"+
      "<div class='gt'><div class='gf' style='width:"+grps[i].p+"%;background:"+grps[i].col+"'></div></div>"+
      "<div class='gp'>"+grps[i].p+"%</div></div>";
  }
  return h+"</div>";
}

function mkDist(dist,col){
  var mx=1,i,bh,bg,op;
  for(i=0;i<dist.length;i++)if(dist[i].c>mx)mx=dist[i].c;
  var h="<div class='dw'>";
  for(i=0;i<dist.length;i++){
    bh=dist[i].c?Math.max(4,Math.round(dist[i].c/mx*65)):3;
    bg=dist[i].c?col:"#f0ede8";
    op=dist[i].c?(0.6+dist[i].c/mx*0.4):1;
    h+="<div class='dc'><div class='dn'>"+(dist[i].c||"")+"</div>"+
      "<div class='db' style='height:"+bh+"px;background:"+bg+";opacity:"+op+"'></div>"+
      "<div class='dl'>"+dist[i].i+"</div></div>";
  }
  return h+"</div>";
}

function mkKpi(v,sub,lbl,col){
  return "<div class='kpi'><div class='kv' style='color:"+col+"'>"+v+"<span style='font-size:.75rem;color:#ccc'>"+sub+"</span></div><div class='kl'>"+lbl+"</div></div>";
}

function mkTs(lbl,n){
  return "<div class='ts'><span>&#9888;</span><span><strong>"+lbl+"</strong> - "+n+" repondant"+(n>1?"s":"")+" (min "+MIN_N+")</span></div>";
}

function mkVb(r,col){
  var sc=r.sc,bg=scB(sc),fc=scC(sc),bl=col||fc,tags="",ti,i;
  ti=[r.age,r.genre,r.rel,r.emo[0]];
  for(i=0;i<ti.length;i++)tags+="<span class='tag ti'>"+ti[i]+"</span>";
  return "<div class='vc' style='border-left-color:"+bl+"'>"+
    "<div class='vt'>&laquo;&nbsp;"+r.vb+"&nbsp;&raquo;</div>"+
    "<div class='vtgs'><span class='tag tsc' style='background:"+bg+";color:"+fc+"'>&#9733; "+sc+"/10</span>"+tags+"</div></div>";
}

function sortedVb(){
  var exp=getExp(),a;
  if(vSort==="asc"){a=exp.slice();a.sort(function(x,y){return x.sc-y.sc;});return a;}
  if(vSort==="desc"){a=exp.slice();a.sort(function(x,y){return y.sc-x.sc;});return a;}
  if(vSort==="random"){a=exp.slice();a.sort(function(){return Math.random()-0.5;});return a;}
  return exp;
}

function validInvalid(grps){
  var v=[],b=[],i;
  for(i=0;i<grps.length;i++){if(grps[i].rows.length>=MIN_N)v.push(grps[i]);else if(grps[i].rows.length>0)b.push(grps[i]);}
  return{v:v,b:b};
}

function renderNotes(){
  var exp=getExp(),st=calcSt(exp),i,sub,scs,a,w,p;
  if(!st)return "<div class='empty'>Aucun repondant.</div>";
  var h="<div class='g4'>"+mkKpi(st.avgSc,"/10","Note artistique","#e63946")+mkKpi(st.avgPt,"/10","Potentiel","#2d6a4f")+mkKpi(st.pct6+"%","","Notes 6+","#c8880a")+mkKpi(st.pctSh+"%","","Partageraient","#457b9d")+"</div>";
  h+="<div class='g2'><div class='card'><div class='ctitle'>Distribution</div>"+mkDist(st.dist,"#e63946")+"</div>";
  h+="<div class='card'><div class='ctitle'>Par relation artiste</div>";
  var rels=["Fan","Connais bien","Connais un peu","Decouverte"];
  for(i=0;i<rels.length;i++){
    sub=[];for(var j=0;j<exp.length;j++)if(exp[j].rel===rels[i])sub.push(exp[j]);
    scs=[];for(var j=0;j<sub.length;j++)scs.push(sub[j].sc);
    a=sub.length?(avg(scs)||0).toFixed(1):"--";
    w=sub.length>0&&sub.length<MIN_N;
    p=sub.length?Math.round(parseFloat(a)/10*100):0;
    h+="<div class='br'><span class='bl"+(w?" w":"")+"'>"+rels[i]+"</span>"+
      "<div class='bt'><div class='bf' style='width:"+p+"%;background:"+(w?"#f4a261":"#e63946")+"'></div></div>"+
      "<span class='bv'>"+a+"/10</span><span class='bn'>("+sub.length+")</span></div>";
  }
  return h+"</div></div>";
}

function renderNotesCmp(){
  var grps=getGrps(),vi=validInvalid(grps),v=vi.v,b=vi.b,h="",i,g,st,kpis,k;
  for(i=0;i<b.length;i++)h+=mkTs(b[i].lbl,b[i].rows.length);
  if(!inverted){
    // Vue par cible : cartes cote a cote
    h+="<div class='cg' style='grid-template-columns:repeat("+Math.max(v.length,1)+",1fr)'>";
    for(i=0;i<v.length;i++){
      g=v[i];st=calcSt(g.rows);
      h+="<div class='cc' style='border-color:"+g.col+"'>";
      h+="<div class='ch2'><div class='cd' style='background:"+g.col+"'></div><span class='ccl'>"+g.lbl+"</span><span class='cn2'>n="+g.rows.length+"</span></div>";
      kpis=[[st.avgSc+"/10","Note",g.col],[st.avgPt+"/10","Potentiel",g.col],[st.pct6+"%","Notes 6+","var(--orange)"],[st.pctSh+"%","Partageraient","var(--purpleL)"]];
      for(k=0;k<kpis.length;k++)h+="<div class='ckr'><span class='ckl'>"+kpis[k][1]+"</span><span class='ckv' style='color:"+kpis[k][2]+"'>"+kpis[k][0]+"</span></div>";
      h+="<div style='margin-top:.65rem'><div class='ctitle'>Distribution</div>"+mkDist(st.dist,g.col)+"</div></div>";
    }
    h+="</div>";
  } else {
    // Vue par KPI : chaque metrique comparee entre toutes les cibles
    var metrics=[["avgSc","Note artistique","#e63946"],["avgPt","Potentiel","#2d6a4f"],["pct6","Notes 6+","#c8880a"],["pctSh","Partageraient","#457b9d"]];
    h+="<div class='card'><div class='ctitle'>Comparaison par indicateur</div>";
    for(k=0;k<metrics.length;k++){
      var mk=metrics[k][0],ml=metrics[k][1],mc=metrics[k][2];
      h+="<div class='gw'><div class='gl' style='color:"+mc+";font-weight:600'>"+ml+"</div>";
      for(i=0;i<v.length;i++){

        y+=58;
      }

      var emos2,ai2;
      if(chap==="emotions"&&mode==="explore"&&st){emos2=st.emos.slice();emos2.sort(function(a,b){return b.p-a.p;});for(var ei=0;ei<emos2.length;ei++){ctx.font="9px sans-serif";ctx.fillStyle="#555";ctx.fillText(emos2[ei].e,PAD,y+7);ctx.fillStyle="#f0ede8";ctx.beginPath();ctx.roundRect(BX,y,BW,8,4);ctx.fill();if(emos2[ei].p>0){ctx.fillStyle="#e63946";ctx.beginPath();ctx.roundRect(BX,y,BW*emos2[ei].p/100,8,4);ctx.fill();}ctx.font="bold 9px sans-serif";ctx.fillStyle="#0e0f12";ctx.textAlign="right";ctx.fillText(emos2[ei].p+"%",W-PAD,y+7);ctx.textAlign="left";y+=20;}}
      if(chap==="actions"&&mode==="explore"&&st){var acts2=st.acts.slice();acts2.sort(function(a,b){return b.p-a.p;});for(ai2=0;ai2<acts2.length;ai2++){ctx.font="9px sans-serif";ctx.fillStyle="#555";ctx.fillText(acts2[ai2].lb,PAD,y+7);ctx.fillStyle="#f0ede8";ctx.beginPath();ctx.roundRect(BX,y,BW,8,4);ctx.fill();if(acts2[ai2].p>0){ctx.fillStyle="#0e0f12";ctx.beginPath();ctx.roundRect(BX,y,BW*acts2[ai2].p/100,8,4);ctx.fill();}ctx.font="bold 9px sans-serif";ctx.textAlign="right";ctx.fillText(acts2[ai2].p+"%",W-PAD,y+7);ctx.textAlign="left";y+=20;}}
      if(chap==="verbatims"){var vbs=sortedVb().slice(0,5),vi2;for(vi2=0;vi2<vbs.length;vi2++){var r=vbs[vi2],fc=scC(r.sc),bl=fc;ctx.fillStyle="white";ctx.beginPath();ctx.roundRect(PAD,y,W-PAD*2,36,5);ctx.fill();ctx.fillStyle=bl;ctx.fillRect(PAD,y,3,36);ctx.font="italic 8px sans-serif";ctx.fillStyle="#0e0f12";var t=r.vb.slice(0,85)+(r.vb.length>85?"...":"");ctx.fillText(t,PAD+7,y+13);ctx.fillStyle=scB(r.sc);ctx.beginPath();ctx.roundRect(PAD+7,y+20,30,9,4);ctx.fill();ctx.font="bold 6px sans-serif";ctx.fillStyle=fc;ctx.fillText("* "+r.sc+"/10",PAD+10,y+27);y+=42;}}
      ctx.fillStyle="#0e0f12";ctx.fillRect(0,H-22,W,22);
      ctx.font="7px sans-serif";ctx.fillStyle="rgba(255,255,255,.4)";ctx.textAlign="center";
      ctx.fillText("HelloScoring - La mer en hiver - Shaga - 50 repondants - "+now,W/2,H-7);
      ctx.textAlign="left";
      var dataUrl=c.toDataURL("image/png");
      document.getElementById("mimgel").src=dataUrl;
      document.getElementById("mdl").href=dataUrl;
      document.getElementById("mdl").download="helloscore-"+lbl.replace(/[^a-z0-9]/gi,"-").toLowerCase()+"-"+Date.now()+".png";
      document.getElementById("mod").className="open";
    }catch(ex){alert("Export impossible: "+ex.message);}
    btn.disabled=false;btn.innerHTML="&#128247; Exporter";
  },50);
}
